<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | fucuu (フクウ) Journal</title>
    <meta name="description" content="{{description}}">
    <link rel="stylesheet" href="../index.css">
    <link rel="canonical" href="https://fucuu.netlify.app/journal/{{slug}}.html">
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{title}} | fucuu (フクウ) Journal">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="../assets/journal_default.png">
    <meta property="og:type" content="article">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <div class="nav-left">
                <button class="menu-toggle" id="menuToggle" aria-label="メニューを開く">
                    <span></span><span></span><span></span>
                </button>
                <div class="logo">
                    <a href="../index.html"><img src="../assets/brand_character.png" alt="fucuu 公式ロゴ"></a>
                </div>
            </div>
            <div class="nav-right">
                <ul class="nav-links-small">
                    <li><a href="../index.html#about">About</a></li>
                    <li><a href="../index.html#products">Products</a></li>
                    <li><a href="index.html">Journal</a></li>
                </ul>
                <a href="https://www.fucuu.net" class="desktop-cta" target="_blank" rel="noopener noreferrer">Shop Now</a>
            </div>
        </div>
    </nav>

    <main style="padding-top: 150px;">
        <article class="container" style="max-width: 800px; margin: 0 auto;">
            <header style="margin-bottom: var(--space-l); text-align: center;">
                <span class="fucuu-accent" style="font-size: 0.9rem; letter-spacing: 0.1em;">Journal</span>
                <h1 style="font-size: clamp(1.8rem, 5vw, 2.8rem); margin-top: 1rem; line-height: 1.4;">{{title}}</h1>
                <p style="color: var(--color-text-light); margin-top: 1rem;">{{date}}</p>
            </header>

            <!-- Featured Image Area -->
            <div class="blog-image featured-image">
                <img src="{{featured_image}}" alt="{{title}}">
            </div>

            <div class="journal-content">
                {{content}}
            </div>

            <footer style="margin-top: var(--space-xl); padding-top: var(--space-m); border-top: 1px solid var(--color-border);">
                <div style="display: flex; align-items: center; gap: var(--space-m); background: #F8F6F2; padding: var(--space-m); border-radius: 8px;">
                    <img src="../assets/brand_logo.png" alt="fucuu" style="width: 60px;">
                    <div>
                        <p style="font-weight: 500; color: var(--color-primary);">fucuu Journal 編集部</p>
                        <p style="font-size: 0.85rem; color: var(--color-text-light);">植物の力で「わたしに戻る」時間を提案するfucuu公式ジャーナルです。フクウロウと一緒に、日々の養生やセルフケアのヒントをお届けします。</p>
                    </div>
                </div>
                <div style="text-align: center; margin-top: var(--space-l);">
                    <a href="index.html" class="link-arrow">Journal一覧へ戻る</a>
                </div>
            </footer>
        </article>
    </main>

    <footer style="background-color: var(--color-text); color: white; padding: var(--space-xl) 0; margin-top: var(--space-xl);">
        <div class="container" style="text-align: center;">
            <p style="font-size: 0.8rem; opacity: 0.7;">&copy; 2026 fucuu All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // Mobile Menu Toggle (simplified for article)
        const menuToggle = document.getElementById('menuToggle');
        menuToggle.addEventListener('click', () => { window.location.href = '../index.html'; });
    </script>
</body>
</html>
